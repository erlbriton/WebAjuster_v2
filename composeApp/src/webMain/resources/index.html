<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAjuster_v2</title>
    <link type="text/css" rel="stylesheet" href="styles.css">

    <!-- 🔥 JS-БИБЛИОТЕКИ (порядок важен!) -->
    <script src="serial.js"></script>
    <script src="modbus.js"></script>
    <script src="ringBuffer.js"></script>
    <script src="pixi_oscillo.js"></script>
    <script src="serial_logic.js"></script>
    <script src="main.js"></script>

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #ffffff;
        }

        #ComposeTarget {
            width: 100vw;
            height: 100vh;
            display: flex;
        }

        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }
    </style>
</head>

<body>

<div id="ComposeTarget"></div>
<!-- 🔥 ТЕСТОВЫЙ КОНТЕЙНЕР ДЛЯ ОСЦИЛЛОГРАФА (Шаг 3) -->


<script type="application/javascript" src="composeApp.js"></script>

<script>
    window.addEventListener("load", function () {
        const loader = document.getElementById("loader");

        if (loader) {
            loader.style.display = "none";
        }

        // 🔥 ПРОВЕРКА: Все ли JS-файлы загрузились?
        console.log("✅ serial.js loaded:", typeof SerialConnection !== 'undefined');
        console.log("✅ modbus.js loaded:", typeof ModbusParser !== 'undefined');
        console.log("✅ ringBuffer.js loaded:", typeof RingBuffer !== 'undefined');
        console.log("✅ pixi_oscillo.js loaded:", typeof oscilloInit !== 'undefined');
    });
</script>

<!-- ОСЦИЛЛОГРАФ -->
<div id="testOscillo" style="
    position: fixed;
    top: 10px;
    left: 10px;
    width: 400px;
    height: 200px;
    z-index: 99999;
    background: white;
    border: 1px solid #ccc;
    pointer-events: none;
    transform: translateZ(0);
    isolation: isolate;
    contain: layout style paint;
">
    <canvas id="oscCanvas" width="400" height="200" style="display: block; width: 100%; height: 100%;"></canvas>
</div>

</body>
</html>
