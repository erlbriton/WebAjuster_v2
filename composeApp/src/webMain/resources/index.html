<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAjuster_v2</title>
    <link type="text/css" rel="stylesheet" href="styles.css">

    <!-- 🔥 JS-БИБЛИОТЕКИ (порядок важен!) -->
    <script src="serial.js"></script>
    <script src="modbus.js"></script>
    <script src="ringBuffer.js"></script>
    <script src="pixi_oscillo.js"></script>
    <script src="serial_logic.js"></script>
    <script src="main.js"></script>

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #ffffff;
        }

        #ComposeTarget {
            width: 100vw;
            height: 100vh;
            display: flex;
        }

        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }
    </style>
</head>

<body>

<div id="ComposeTarget"></div>
<!-- 🔥 ТЕСТОВЫЙ КОНТЕЙНЕР ДЛЯ ОСЦИЛЛОГРАФА (Шаг 3) -->


<script type="application/javascript" src="composeApp.js"></script>

<script>
    window.addEventListener("load", function () {
        const loader = document.getElementById("loader");

        if (loader) {
            loader.style.display = "none";
        }

        // 🔥 ПРОВЕРКА: Все ли JS-файлы загрузились?
        console.log("✅ serial.js loaded:", typeof SerialConnection !== 'undefined');
        console.log("✅ modbus.js loaded:", typeof ModbusParser !== 'undefined');
        console.log("✅ ringBuffer.js loaded:", typeof RingBuffer !== 'undefined');
        console.log("✅ pixi_oscillo.js loaded:", typeof oscilloInit !== 'undefined');
    });
</script>

<!-- Управление новой левой панелью -->
<script>
    // Показать левую панель
    window.showLeftPanel = function() {
        console.log('showLeftPanel вызвана');
        const panel = document.getElementById('leftPanel');
        if (panel) {
            panel.style.display = 'flex';
        } else {
            console.error('Панель leftPanel не найдена в DOM');
        }
    };

    // Скрыть левую панель
    window.hideLeftPanel = function() {
        console.log('hideLeftPanel вызвана');
        const panel = document.getElementById('leftPanel');
        if (panel) {
            panel.style.display = 'none';
        }
    };

    // Скрыть панель при загрузке страницы
    window.addEventListener('load', () => {
        const panel = document.getElementById('leftPanel');
        if (panel) {
            panel.style.display = 'none';
        }
    });
</script>

<!-- Левая панель мониторинга параметров -->
<div id="leftPanel" style="
    position: fixed;
    left: 10px;
    top: 10px;
    width: 800px;
    height: calc(100vh - 20px);
    background: white;
    border: 1px solid #ccc;
    display: none;
    flex-direction: column;
    z-index: 1000;
">
    <!-- Шапка с кнопками -->
    <div id="leftPanelHeader" style="
        padding: 10px;
        background: #f0f0f0;
        border-bottom: 1px solid #ccc;
        display: flex;
        gap: 10px;
    ">
        <button id="btnStart" style="padding: 5px 15px;">СТАРТ</button>
        <button id="btnStop" style="padding: 5px 15px;">СТОП</button>
    </div>

    <!-- Таблица параметров -->
    <div id="paramsTable" style="
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
    ">
        <!-- Сюда будут добавляться строки -->
    </div>
</div>

<!-- Подключение скрипта левой панели -->
<script src="left_panel.js"></script>

</body>
</html>
