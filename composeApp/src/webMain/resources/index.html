<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAjuster_v2</title>
    <link type="text/css" rel="stylesheet" href="styles.css">

    <script src="serial_logic.js"></script>

    <style>
        /* Убираем отступы и фиксируем размер экрана */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #ffffff;
        }

        /* Контейнер для Compose */
        #ComposeTarget {
            width: 100vw;
            height: 100vh;
            display: flex;
        }

        /* Стили для лоадера */
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }
    </style>
</head>

<body>

<div id="ComposeTarget"></div>

<div id="loader">
    <svg xmlns="http://www.w3.org/2000/svg"
         width="40"
         height="40"
         viewBox="0 0 50 50">

        <circle
                cx="25"
                cy="25"
                r="20"
                stroke="#ccc"
                stroke-width="4"
                fill="none"/>

        <circle
                cx="25"
                cy="25"
                r="20"
                stroke="#333"
                stroke-width="4"
                fill="none"
                stroke-linecap="round"
                stroke-dasharray="90 125">

            <animateTransform
                    attributeName="rotate"
                    from="0 25 25"
                    to="360 25 25"
                    dur="1s"
                    repeatCount="indefinite"/>
        </circle>
    </svg>
</div>

<script type="application/javascript" src="composeApp.js"></script>

<script>
    window.addEventListener("load", function () {
        const loader = document.getElementById("loader");

        if (loader) {
            loader.style.display = "none";
        }
    });
</script>

</body>
</html>
