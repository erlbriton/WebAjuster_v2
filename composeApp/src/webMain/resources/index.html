<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAjuster_v2</title>
    <link type="text/css" rel="stylesheet" href="styles.css">

    <!-- 🔥 JS-БИБЛИОТЕКИ (порядок важен!) -->
    <script src="serial.js"></script>
    <script src="modbus.js"></script>
    <script src="ringBuffer.js"></script>
    <script src="pixi_oscillo.js"></script>
    <script src="serial_logic.js"></script>
    <!--<script src="main.js"></script> -->

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #ffffff;
        }

        #ComposeTarget {
            width: 100vw;
            height: 100vh;
            display: flex;
        }

        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }
    </style>
</head>

<body>

<div id="ComposeTarget"></div>
<!-- 🔥 ТЕСТОВЫЙ КОНТЕЙНЕР ДЛЯ ОСЦИЛЛОГРАФА (Шаг 3) -->
<div id="testOscillo" style="
    position: fixed;
    top: 20px;
    right: 20px;
    width: 400px;
    height: 200px;
    border: 3px solid red;
    background: white;
    z-index: 9999;
    box-shadow: 0 0 20px rgba(255,0,0,0.5);
"></div>

<div id="loader">
    <svg xmlns="http://www.w3.org/2000/svg"
         width="40"
         height="40"
         viewBox="0 0 50 50">

        <circle
                cx="25"
                cy="25"
                r="20"
                stroke="#ccc"
                stroke-width="4"
                fill="none"/>

        <circle
                cx="25"
                cy="25"
                r="20"
                stroke="#333"
                stroke-width="4"
                fill="none"
                stroke-linecap="round"
                stroke-dasharray="90 125">

            <animateTransform
                    attributeName="rotate"
                    from="0 25 25"
                    to="360 25 25"
                    dur="1s"
                    repeatCount="indefinite"/>
        </circle>
    </svg>
</div>

<script type="application/javascript" src="composeApp.js"></script>

<script>
    window.addEventListener("load", function () {
        const loader = document.getElementById("loader");

        if (loader) {
            loader.style.display = "none";
        }

        // 🔥 ПРОВЕРКА: Все ли JS-файлы загрузились?
        console.log("✅ serial.js loaded:", typeof SerialConnection !== 'undefined');
        console.log("✅ modbus.js loaded:", typeof ModbusParser !== 'undefined');
        console.log("✅ ringBuffer.js loaded:", typeof RingBuffer !== 'undefined');
        console.log("✅ pixi_oscillo.js loaded:", typeof oscilloInit !== 'undefined');
    });
</script>

</body>
</html>
