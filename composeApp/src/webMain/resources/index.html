<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAjuster_v2</title>
    <link type="text/css" rel="stylesheet" href="styles.css">

    <script src="serial.js"></script>
    <script src="modbus.js"></script>
    <script src="ringBuffer.js"></script>
    <script src="pixi_oscillo.js"></script>
    <script src="serial_logic.js"></script>
    <script src="main.js"></script>

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #ffffff;
        }

        #ComposeTarget {
            width: 100vw;
            height: 100vh;
            display: flex;
        }

        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        .param-table {
            position: fixed;
            top: 10px;
            left: 10px;
            width: 800px;
            height: calc(100vh - 20px);
            background: white;
            border: 1px solid #ccc;
            overflow: auto;
            z-index: 1000;
        }

        .param-table table {
            width: 100%;
            border-collapse: collapse;
            font-family: monospace;
            font-size: 12px;
        }

        .param-table th {
            background: #f0f0f0;
            padding: 2px 5px;
            text-align: left;
            border-bottom: 1px solid #ccc;
        }

        .param-table td {
            border: none;
            padding: 0 5px;
            height: 20px;
            vertical-align: middle;
            line-height: 20px;
        }

        .param-table tr.selected {
            background: #00ff00 !important;
        }

        .graph-cell {
            position: relative;
            height: 100%;
            width: 100%;
            padding: 0 !important;
            overflow: hidden;
        }

        .graph-cell canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .hex-value { color: #d32f2f; }
        .phys-value { color: #1976d2; font-weight: bold; }
    </style>
</head>

<body>

<div id="ComposeTarget"></div>

<script type="application/javascript" src="composeApp.js"></script>

<script>
    window.addEventListener("load", function () {
        const loader = document.getElementById("loader");
        if (loader) loader.style.display = "none";

        console.log("✅ serial.js loaded:", typeof SerialConnection !== 'undefined');
        console.log("✅ modbus.js loaded:", typeof ModbusParser !== 'undefined');
        console.log("✅ ringBuffer.js loaded:", typeof RingBuffer !== 'undefined');
        console.log("✅ pixi_oscillo.js loaded:", typeof oscilloInit !== 'undefined');
    });
</script>

<div class="param-table">
    <table id="paramTable">
        <thead>
        <tr>
            <th style="width: 150px;">Name</th>
            <th style="width: 100px;">Hex</th>
            <th style="width: 100px;">Physical</th>
            <th style="width: 60px;">Unit</th>
            <th>Graph</th>
        </tr>
        </thead>
        <tbody id="paramTableBody">
        </tbody>
    </table>
</div>

</body>
</html>
